name = "weathertrackers-contact-worker"
account_id = "7babc49d770219b5f947e69edd9128a5"
main = "src/index.js"
compatibility_date = "2024-11-01"

send_email = [
  { name = "FORM_EMAIL", destination_address = "cloudflare@weathertrackers.com" }
]

[vars]
# Must be an address on a domain where Cloudflare Email Routing is enabled
FROM_ADDRESS = "no-reply@weathertrackers.net"

# The inbox that should receive the submission (same as destination above is fine)
CONTACT_TO = "cloudflare@weathertrackers.com"
